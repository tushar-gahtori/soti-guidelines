<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SOTI Support · Agent Guidelines</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* SOTI Brand Palette */
      --soti-blue:     #0074AA;
      --soti-wave:     #0099D3;
      --soti-coral:    #F1614F;
      --soti-marine:   #AED255;
      --soti-electric: #32B6E9;
      --soti-pebble:   #7C7C81;
      /* UI Tokens */
      --bg:            #EEF4F8;
      --surface:       #FFFFFF;
      --ink:           #0D1F2D;
      --ink-mid:       #3A5166;
      --ink-light:     #6A7F90;
      --border:        #D3E0EA;
      --dont-bg:       #FFF6F5;
      --dont-border:   #F9CEC9;
      --do-bg:         #F0F8FF;
      --do-border:     #BDD8ED;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      overflow-x: hidden;
      line-height: 1.5;
    }

    /* Subtle background blobs */
    body::before {
      content: '';
      position: fixed;
      top: -140px; left: -140px;
      width: 440px; height: 440px;
      background: radial-gradient(circle, rgba(0,153,211,0.1) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    header {
      text-align: center;
      padding: 48px 24px 32px;
      position: relative;
      z-index: 1;
    }

    .header-logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      margin-bottom: 22px;
    }

    .header-logo .logo-mark {
      height: 44px;
      width: auto;
      display: block;
    }

    .header-logo .logo-tagline {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--soti-wave);
    }

    .header-divider {
      width: 48px;
      height: 2px;
      background: var(--soti-wave);
      margin: 0 auto 20px;
      border-radius: 2px;
    }

    .eyebrow {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      color: var(--soti-blue);
      margin-bottom: 10px;
    }

    h1 {
      font-size: clamp(1.8rem, 5vw, 3.2rem);
      font-weight: 700;
      line-height: 1.12;
      color: var(--ink);
      letter-spacing: -0.01em;
    }

    h1 em { font-style: italic; color: var(--soti-wave); }

    .hint {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 18px;
      font-size: 11px;
      font-weight: 600;
      color: var(--soti-blue);
      background: rgba(0,116,170,0.1);
      border: 1px solid rgba(0,116,170,0.18);
      padding: 6px 16px;
      border-radius: 50px;
    }

    main {
      max-width: 940px;
      margin: 0 auto;
      padding: 0 20px 80px;
      position: relative;
      z-index: 1;
    }

    .category-label {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 32px 0 12px;
    }

    .cat-pip {
      width: 4px;
      height: 16px;
      border-radius: 2px;
      background: var(--soti-wave);
    }

    .category-label span {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--soti-blue);
    }

    .cat-line { flex: 1; height: 1px; background: var(--border); }

    .section { margin-bottom: 12px; }

    .section-trigger {
      width: 100%;
      background: var(--surface);
      border: 2px solid transparent;
      border-radius: 14px;
      padding: 18px 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      transition: all 0.28s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 2px 10px rgba(0,116,170,0.07);
      text-align: left;
    }

    .section-trigger:hover, .section.active .section-trigger {
      background: var(--soti-blue);
      border-color: var(--soti-blue);
      box-shadow: 0 8px 28px rgba(0,116,170,0.3);
      transform: translateY(-2px);
    }

    .trigger-left { display: flex; align-items: flex-start; gap: 14px; flex: 1; }

    .section-number {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: var(--soti-blue);
      flex-shrink: 0;
      border: 1.5px solid var(--border);
    }

    .section-trigger:hover .section-number, .section.active .section-number {
      background: rgba(255,255,255,0.18);
      border-color: rgba(255,255,255,0.25);
      color: #fff;
    }

    .section-title { font-size: 14px; font-weight: 600; color: var(--ink); }
    .section-trigger:hover .section-title, .section.active .section-title { color: #fff; }

    .section-subtitle { font-size: 11px; color: var(--ink-light); margin-top: 3px; }
    .section-trigger:hover .section-subtitle, .section.active .section-subtitle { color: rgba(255,255,255,0.6); }

    .chevron svg { width: 13px; height: 13px; stroke: var(--soti-blue); transition: transform 0.4s; }
    .section-trigger:hover .chevron svg, .section.active .chevron svg { stroke: #fff; }
    .section.active .chevron svg { transform: rotate(180deg); }

    .cards-panel {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      transition: all 0.5s ease;
    }

    .section.active .cards-panel { max-height: 1000px; opacity: 1; margin-top: 12px; }

    .card {
      border-radius: 12px;
      padding: 20px 18px;
      border: 1.5px solid var(--border);
      background: var(--surface);
    }

    .card.dont { background: var(--dont-bg); border-color: var(--dont-border); border-left: 4px solid var(--soti-coral); }
    .card.do { background: var(--do-bg); border-color: var(--do-border); border-left: 4px solid var(--soti-wave); }

    .card-badge {
      display: inline-flex;
      padding: 3px 11px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      margin-bottom: 12px;
      color: #fff;
    }

    .card.dont .card-badge { background: var(--soti-coral); }
    .card.do .card-badge { background: var(--soti-blue); }

    .card h3 { font-size: 13px; margin-bottom: 8px; }
    .card p, .card li { font-size: 12.5px; color: var(--ink-mid); }
    .card ul { padding-left: 18px; }

    .page-footer {
      background: var(--soti-blue);
      padding: 18px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: #fff;
    }

    @media (max-width: 600px) {
      .cards-panel { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-logo">
    <svg class="logo-mark" viewBox="0 0 180 54" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M6 40C6 40 10 52 24 52C38 52 42 44 42 38C42 25 10 26 10 16C10 9.5 15.5 6 24 6C32.5 6 37 12 37 12" stroke="#0074AA" stroke-width="8" stroke-linecap="round" fill="none"/>
      <ellipse cx="72" cy="29" rx="18.5" ry="23" stroke="#0074AA" stroke-width="8" fill="none"/>
      <line x1="104" y1="6" x2="144" y2="6" stroke="#0074AA" stroke-width="8" stroke-linecap="round"/>
      <line x1="124" y1="6" x2="124" y2="52" stroke="#0074AA" stroke-width="8" stroke-linecap="round"/>
      <line x1="160" y1="6" x2="160" y2="52" stroke="#0074AA" stroke-width="8" stroke-linecap="round"/>
    </svg>
    <span class="logo-tagline">One Platform · Connecting Everything</span>
  </div>
  <div class="header-divider"></div>
  <div class="eyebrow">SOTI Global Support · Internal Handbook</div>
  <h1>Agent Guidelines & <em>Best Practices</em></h1>
  <div class="hint">Click or hover a heading to expand</div>
</header>

<main id="accordion"></main>

<footer class="page-footer">
  <div class="f-left">SOTI Support Operations</div>
  <div class="f-right">Confidential · Internal Use Only</div>
</footer>

<script>
  const items = [
    {
      "title": `Customer Raises a Cloud Server Performance Ticket`,
      "subtitle": `Investigation & escalation protocol`,
      "category": `Cloud & Server Handling`,
      "do": {
        "heading": `Conduct a thorough investigation before any action.`,
        "bullets": [
          `Verify whether the server resources align with the total number of purchased licenses.`,
          `If resources are insufficient, raise a cloud ticket to request a server upgrade.`,
          `If the issue is not related to server resources, review the logs and consult the internal team.`
        ]
      },
      "dont": {
        "heading": `Do not RDP into the Cloud server (GMS) or share internal server details.`,
        "body": `The support agent must not RDP into the Cloud server (GMS) or take screenshots of Task Manager showing server details for the customer.`
      }
    },
    {
      "title": `Reaching Out to Cross-Functional Teams`,
      "subtitle": `Internal communication channel`,
      "category": `Internal Communication & Escalation`,
      "do": {
        "heading": `Create a JIRA and have L3 / TL review it.`,
        "body": `They will help reach out to PMs or POs through the proper communication channels.`
      },
      "dont": {
        "heading": `Do not reach out directly to POs and PMs.`,
        "body": `Never contact POs or PMs directly—always follow the proper internal escalation path.`
      }
    },
    {
      "title": `Customer Recovery`,
      "subtitle": `New contact handling`,
      "do": {
        "heading": `Recovery on New Contact is a must.`,
        "body": `Always perform customer recovery when taking on a new contact. Acknowledge the customer and show ownership.`
      },
      "dont": {
        "heading": `Do not skip the recovery phase.`,
        "body": `Failing to perform recovery on a new contact is a gap in service quality.`
      }
    },
    {
      "title": `OOO Email to Customer`,
      "subtitle": `Out-of-office communication tone`,
      "category": `Email & Written Communication`,
      "do": {
        "heading": `Focus on a polite and courteous tone.`,
        "body": `Use professional language like "Apologies for the delay" and stay customer-centric.`
      },
      "dont": {
        "heading": `Do not disclose personal reasons like sick leave.`,
        "body": `We must never mention sick leave or personal excuses in customer-facing communication.`
      }
    },
    {
      "title": `Upgrade Cases – Best Practices`,
      "subtitle": `Pre-upgrade validation`,
      "category": `Upgrade Management`,
      "do": {
        "heading": `Perform server tuning and review prerequisites.`,
        "bullets": [
          `Share release notes and prerequisites with the customer.`,
          `Perform required server tuning (log shrinking) before scheduling.`
        ]
      },
      "dont": {
        "heading": `Do not schedule without validating prerequisites.`,
        "body": `Scheduling without checks is a leading cause of upgrade failures.`
      }
    }
  ];

  function init() {
    const container = document.getElementById('accordion');
    items.forEach((item, i) => {
      if (item.category) {
        const cat = document.createElement('div');
        cat.className = 'category-label';
        cat.innerHTML = `<div class="cat-pip"></div><span>${item.category}</span><div class="cat-line"></div>`;
        container.appendChild(cat);
      }

      const section = document.createElement('div');
      section.className = 'section';
      
      const doContent = item.do.bullets 
        ? `<ul>${item.do.bullets.map(b => `<li>${b}</li>`).join('')}</ul>` 
        : `<p>${item.do.body}</p>`;

      section.innerHTML = `
        <button class="section-trigger">
          <div class="trigger-left">
            <div class="section-number">${i + 1}</div>
            <div class="trigger-text">
              <div class="section-title">${item.title}</div>
              <div class="section-subtitle">${item.subtitle}</div>
            </div>
          </div>
          <div class="chevron"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="6 9 12 15 18 9"/></svg></div>
        </button>
        <div class="cards-panel">
          <div class="card dont"><div class="card-badge">✕ Don't</div><h3>${item.dont.heading}</h3><p>${item.dont.body || ''}</p></div>
          <div class="card do"><div class="card-badge">✓ Do</div><h3>${item.do.heading}</h3>${doContent}</div>
        </div>
      `;

      const btn = section.querySelector('.section-trigger');
      btn.addEventListener('click', () => {
        section.classList.toggle('active');
        section._pinned = section.classList.contains('active');
      });
      
      section.addEventListener('mouseenter', () => section.classList.add('active'));
      section.addEventListener('mouseleave', () => {
        if(!section._pinned) section.classList.remove('active');
      });

      container.appendChild(section);
    });
  }

  document.addEventListener('DOMContentLoaded', init);
</script>

</body>
</html>
